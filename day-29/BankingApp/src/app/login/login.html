<section>
    <h1>Login Page</h1>
    <form #loginForm="ngForm" (submit)="handleLoginClick()">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" [(ngModel)]="loginModel().username" name="username" class="form-control" required>
        </div>       
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" [(ngModel)]="loginModel().password"  name="password" class="form-control" required>
        </div>
        <br>
        <br>
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
</section>
