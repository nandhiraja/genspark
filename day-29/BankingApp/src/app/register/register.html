<section>
    <h1>Register Page</h1>
    <form #registerForm="ngForm" (submit)="handleRegisterClick()">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" [(ngModel)]="registerModel().username" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" [(ngModel)]="registerModel().name" name="name" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" [(ngModel)]="registerModel().email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="phone">Phone:</label>
            <input type="text" id="phone" [(ngModel)]="registerModel().phone" name="phone" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="status">Status:</label>
            <input type="text" id="status" [(ngModel)]="registerModel().status" name="status" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="dateOfBirth">Date of Birth:</label>
            <input type="date" id="dateOfBirth" [(ngModel)]="registerModel().dateOfBirth" name="dateOfBirth" class="form-control" required>
        </div>
        <br>
        <br>
        <button type="submit" class="btn btn-primary">Register</button>
    </form>
</section>
