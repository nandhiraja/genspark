<div class="toast-container">
  @for (toast of toasts; track toast.id) {
    <div class="toast toast-{{ toast.type }}" (click)="removeToast(toast)">
      <span class="toast-icon">
        @if (toast.type === 'success') { ✓ }
        @if (toast.type === 'error') { ✕ }
        @if (toast.type === 'warning') { ⚠ }
        @if (toast.type === 'info') { ℹ }
      </span>
      {{ toast.message }}
    </div>
  }
</div>
