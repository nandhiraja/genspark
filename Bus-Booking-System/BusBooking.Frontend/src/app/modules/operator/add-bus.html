<div class="op-page container">
  <h2>Add New Bus</h2>
  <div class="card" style="padding:28px; max-width:560px;">
    <div class="form-group"><label>Route</label>
      <select class="form-control" [(ngModel)]="routeId">
        <option value="">Select route</option>
        @for (r of routes; track r.id) { <option [value]="r.id">{{ r.source }} → {{ r.destination }}</option> }
      </select>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group"><label>Start Time</label><input class="form-control" type="datetime-local" [(ngModel)]="startTime"></div>
      <div class="form-group"><label>End Time</label><input class="form-control" type="datetime-local" [(ngModel)]="endTime"></div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;">
      <div class="form-group"><label>Price (₹)</label><input class="form-control" type="number" [(ngModel)]="price"></div>
      <div class="form-group"><label>Total Seats</label><input class="form-control" type="number" [(ngModel)]="totalSeats"></div>
      <div class="form-group"><label>Bus Number</label><input class="form-control" [(ngModel)]="busNumber" placeholder="TN01AB1234"></div>
    </div>
    <button class="btn btn-primary btn-block" (click)="submit()" [disabled]="loading">
      @if (loading) { <span class="spinner"></span> } @else { Add Bus }
    </button>
  </div>
</div>
