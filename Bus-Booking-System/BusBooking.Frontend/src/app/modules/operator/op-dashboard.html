<div class="op-page container">
  <h2>Operator Dashboard</h2>
  @if (loading) { <div class="page-loader"><div class="spinner"></div></div> }
  @if (!loading && bookings.length === 0) { <p style="color:var(--slate)">No bookings yet for your buses.</p> }
  @for (b of bookings; track b.id) {
    <div class="card bus-manage-card">
      <div class="info">
        <h4>Booking #{{ b.id | slice:0:8 }}</h4>
        <span>₹{{ b.totalAmount }} · {{ b.status }}</span>
      </div>
      <span class="badge" [class.badge-success]="b.status === 'CONFIRMED'" [class.badge-danger]="b.status === 'CANCELLED'">{{ b.status }}</span>
    </div>
  }
</div>
