<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Welcome back</h2>
      <p>Sign in to your GO-BUS account</p>
    </div>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" class="form-control" [(ngModel)]="email" name="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" class="form-control" [(ngModel)]="password" name="password" placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" [disabled]="loading">
        @if (loading) { <span class="spinner"></span> } @else { Sign In }
      </button>
    </form>
    <p class="auth-footer">Don't have an account? <a routerLink="/auth/register">Sign up</a></p>
  </div>
</div>
