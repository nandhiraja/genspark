<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Create account</h2>
      <p>Join GO-BUS and start booking</p>
    </div>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input id="name" type="text" class="form-control" [(ngModel)]="name" name="name" placeholder="John Doe">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" class="form-control" [(ngModel)]="email" name="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" class="form-control" [(ngModel)]="password" name="password" placeholder="Minimum 6 characters">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" [disabled]="loading">
        @if (loading) { <span class="spinner"></span> } @else { Create Account }
      </button>
    </form>
    <p class="auth-footer">Already have an account? <a routerLink="/auth/login">Sign in</a></p>
  </div>
</div>
